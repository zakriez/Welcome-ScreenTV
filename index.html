<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODENAS KAWASAKI | Selamat Datang</title>
    <style>
        :root {
            --kawasaki-green: #66FF00; 
            --carbon-black: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Orbitron', sans-serif;
        }

        /* Container Slideshow */
        #slideshow-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* Overlay Gelap */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
            z-index: 2;
        }

        /* Kandungan Utama */
        .content-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 0;
        }

        .logo {
            width: 50%; 
            max-width: 550px;
            filter: none;
        }

        .welcome-text {
            color: white;
            font-size: 4.5rem;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            text-shadow: 4px 4px 0px var(--kawasaki-green);
            text-align: center;
        }

        .editable-section {
            border-left: 4px solid var(--kawasaki-green);
            padding-left: 20px;
            margin-top: 15px;
            background: rgba(0,0,0,0.6);
            padding-right: 25px;
            border-radius: 0 10px 10px 0;
            backdrop-filter: blur(5px);
        }

        .visitor-name {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            outline: none;
            text-transform: uppercase;
        }

        .visit-purpose {
            color: var(--kawasaki-green);
            font-size: 1rem;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Bar Bawah Kecil & Bahasa Melayu */
        .bottom-bar {
            display: flex;
            gap: 30px;
            background: rgba(10, 10, 10, 0.9);
            padding: 10px 35px;
            border: 1px solid rgba(102, 255, 0, 0.5);
            color: white;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .info-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .label { 
            font-size: 0.55rem;
            color: var(--kawasaki-green); 
            font-weight: bold; 
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .value { 
            font-size: 1rem;
            font-weight: bold; 
            font-family: monospace; 
        }

        @media (max-width: 768px) {
            .welcome-text { font-size: 2.5rem; }
            .logo { width: 70%; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="slideshow-wrapper">
        <div class="slide active" style="background-image: url('https://modenas.my/img/homepage-slider/z15gt-banner.jpg');"></div>
        
        <div class="slide" style="background-image: url('poster.jpg');"></div>
        
        <div class="slide" style="background-image: url('Gemini_Generated_Image_xlorrsxlorrsxlor.jpg');"></div>
    </div>

    <div class="overlay"></div>

    <div class="content-layer">
        <img src="Dark_Background (1).gif" alt="MODENAS" class="logo">

        <div class="center-box">
            <h1 class="welcome-text">SELAMAT DATANG</h1>
            <div class="editable-section">
                <div class="visitor-name" contenteditable="true" spellcheck="false">NAMA PELAWAT</div>
                <div class="visit-purpose" contenteditable="true" spellcheck="false">TUJUAN LAWATAN</div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="info-item">
                <span class="label">MASA</span>
                <span id="clock" class="value">00:00:00</span>
            </div>
            <div class="info-item">
                <span class="label">TARIKH</span>
                <span id="date" class="value">-- --- ----</span>
            </div>
            <div class="info-item">
                <span class="label">CUACA</span>
                <span class="value"><span id="temp">--</span>°C / <span id="desc">...</span></span>
            </div>
        </div>
    </div>

    <script>
        let slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        function showNextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(showNextSlide, 6000);

        function updateDisplay() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
            const options = { day: '2-digit', month: 'short', year: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('ms-MY', options).toUpperCase();
        }

        async function updateWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=5.81&longitude=100.47&current_weather=true');
                const data = await res.json();
                document.getElementById('temp').innerText = Math.round(data.current_weather.temperature);
                const codes = { 0: "CERAH", 1: "CERAH", 2: "BERAWAN", 3: "MENDUNG", 61: "HUJAN", 95: "RIBUT" };
                document.getElementById('desc').innerText = codes[data.current_weather.weathercode] || "BAIK";
            } catch (e) { document.getElementById('desc').innerText = "TIADA"; }
        }

        setInterval(updateDisplay, 1000);
        updateDisplay();
        updateWeather();
        setInterval(updateWeather, 900000);
    </script>
</body>
</html>
